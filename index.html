<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jaolove.studio16</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fefcf0; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; color: #555; }
        .banner { width: 100%; max-width: 400px; height: auto; border-radius: 15px; margin-bottom: 20px; }
        .info { text-align: center; margin-bottom: 20px; }
        .card { background-color: white; border: 2px solid #b22222; border-radius: 20px; padding: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stars { font-size: 30px; color: #d3d3d3; cursor: pointer; margin: 15px 0; }
        .stars span.active { color: #ffcc00; }
        .submit-btn { background-color: #dce775; border: none; padding: 10px 20px; border-radius: 10px; font-size: 16px; cursor: not-allowed; opacity: 0.6; }
        .submit-btn.enabled { cursor: pointer; opacity: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .upload-box { border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; border-radius: 10px; margin-bottom: 10px; }
        #fullSizeView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: block; margin: 5px auto; }
    </style>
</head>
<body>
    <img src="https://via.placeholder.com/400x200?text=Banner+Image" alt="Banner" class="banner">
    <div class="info">
        <h1>⁺‧⊹ ࣪ ˖ 🖤₊˚ ⋆ 𝒄𝒓𝒆𝒅𝒊𝒕 𝒇𝒐𝒓 𝒑𝒂𝒕𝒕𝒊𝒓𝒂 だ ⋆ ˚🕸️๋࣭ ⭑ ‧⁺</h1>
        <p>เค้ารบกวนลูกค้าที่น่ารัก กด ★ ด้านล่าง ✨<br>🕷 พร้อมรีวิวการใช้บริการของร้านเค้าสั้นๆให้ทีน้าค้าบ 🦇.</p>
    </div>
    <div class="card">
        <h3>plus one for pattira だ</h3>
        <p>เลือกคะแนนจาก 1 ถึง 5</p>
        <div class="stars" id="star-container">
            <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <button id="submit-btn" class="submit-btn" disabled onclick="openModal()">click here to star me.</button>
    </div>

    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>ฝากรีวิว</h2>
            <input type="text" placeholder="ชื่อรีวิว เช่น ประสบการณ์ที่ยอดเยี่ยม">
            <textarea placeholder="เขียนคำติชมที่ซื่อสัตย์ของคุณ ..."></textarea>
            <p>เกี่ยวกับคุณ</p>
            <input type="text" placeholder="ชื่อของคุณ *">
            
            <p>รูปโปรไฟล์ของคุณ</p>
            <div class="upload-box" onclick="document.getElementById('profileInput').click()">
                <img id="profilePreview" src="" class="profile-img" style="display:none;">
                <span id="profileText">📷 อัปโหลดรูปโปรไฟล์</span>
            </div>
            <input type="file" id="profileInput" hidden onchange="handleProfile(event)">
            <p>รูปถ่ายของคุณ (รีวิว)</p>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <img id="imgPreview" src="" style="width: 50px; display:none;">
                <span id="uploadText">📷</span>
            </div>
            <input type="file" id="fileInput" hidden onchange="handleImage(event)">
            <button onclick="alert('ส่งรีวิวแล้ว ขอบคุณค่ะ!')" style="width: 100%; padding: 15px; margin-top: 20px; background: black; color: white; border-radius: 20px; border: none;">ส่ง</button>
        </div>
    </div>

    <div id="fullSizeView" onclick="this.style.display='none'">
        <img id="fullImg" style="max-width: 90%; max-height: 90%;">
    </div>

    <script>
        function setRating(r) {
            document.querySelectorAll('.stars span').forEach((s, i) => s.className = i < r ? 'active' : '');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.add('enabled');
        }
        function openModal() { document.getElementById('reviewModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }
        
        function handleProfile(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('profilePreview');
                img.src = event.target.result;
                img.style.display = 'block';
                document.getElementById('profileText').style.display = 'none';
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('imgPreview');
                img.src = event.target.result;
                img.style.display = 'block';
                img.onclick = () => { document.getElementById('fullImg').src = event.target.result; document.getElementById('fullSizeView').style.display = 'flex'; };
                document.getElementById('uploadText').style.display = 'none';
            }
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
