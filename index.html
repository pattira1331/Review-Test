<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Store Review System</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f1ea; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .image-box { width: 500px; height: 300px; background-color: #ddd; border: 2px dashed #999; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 1.2em; }
        .credit { font-size: 18px; margin-bottom: 30px; color: #333; }
        .review-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 500px; margin-bottom: 40px; }
        .stars { font-size: 40px; cursor: pointer; color: #ccc; margin: 20px 0; }
        .stars .active { color: #ffd700; }
        button { background: black; color: white; padding: 15px 30px; border: none; border-radius: 30px; cursor: pointer; font-size: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 15px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .review-item { background: white; padding: 25px; border-radius: 15px; margin-top: 20px; width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; }
        .review-img { max-width: 150px; height: 150px; object-fit: cover; border-radius: 10px; margin-top: 10px; cursor: pointer; display: block; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://save-review-54d0b-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRating = 0;

        window.setRating = (r) => {
            currentRating = r;
            document.querySelectorAll('#star-rating span').forEach((s, i) => s.className = i < r ? 'active' : '');
        };

        // ฟังก์ชันอ่านรูปภาพแบบ Promise
        const readFileAsDataURL = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        };

        window.openModal = () => document.getElementById('modal').style.display = 'flex';

        // ฟังก์ชันแสดงรูปภาพเต็มจอ
        window.viewImage = (src) => {
            document.getElementById('full-img').src = src;
            document.getElementById('image-modal').style.display = 'flex';
        };

        window.submitReview = async () => {
            const title = document.getElementById('rev-title').value;
            const body = document.getElementById('rev-body').value;
            const name = document.getElementById('rev-name').value;
            const fileInput = document.querySelector('input[type="file"]');

            if(!name || !body) { alert("กรุณากรอกชื่อและเนื้อหารีวิวให้ครบ"); return; }

            let base64Image = "";
            if (fileInput.files.length > 0) {
                base64Image = await readFileAsDataURL(fileInput.files[0]);
            }

            try {
                await push(ref(db, 'reviews/'), { 
                    title, body, name, rating: currentRating, image: base64Image 
                });
                alert("ส่งรีวิวสำเร็จ!");
                
                document.getElementById('modal').style.display = 'none';
                document.getElementById('rev-title').value = '';
                document.getElementById('rev-body').value = '';
                document.getElementById('rev-name').value = '';
                fileInput.value = '';
                currentRating = 0;
                setRating(0);
            } catch (error) {
                alert("เกิดข้อผิดพลาด: " + error.message);
            }
        };

        window.removeReview = (key) => {
            const password = prompt("กรุณากรอกรหัสผ่านเพื่อลบรีวิว:");
            if (password === "1256") {
                remove(ref(db, 'reviews/' + key));
            } else if (password !== null) {
                alert("รหัสผ่านไม่ถูกต้อง");
            }
        };

        onValue(ref(db, 'reviews/'), (snapshot) => {
            const container = document.getElementById('reviews-container');
            container.innerHTML = '';
            snapshot.forEach((childSnapshot) => {
                const r = childSnapshot.val();
                const key = childSnapshot.key;
                const div = document.createElement('div');
                div.className = 'review-item';
                
                const imgTag = r.image ? `<img src="${r.image}" class="review-img" onclick="viewImage('${r.image}')" title="คลิกเพื่อดูรูปเต็ม">` : '';

                div.innerHTML = `
                    <strong>${r.title}</strong><br>
                    คะแนน: ${r.rating} ดาว<br>
                    <p>${r.body}</p>
                    ${imgTag}
                    <br><small>โดย: ${r.name}</small>
                    <br><button onclick="removeReview('${key}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; margin-top:10px;">ลบรีวิว</button>
                `;
                container.appendChild(div);
            });
        });
    </script>
</head>
<body>

    <div class="image-box">ใส่รูปหน้าเว็บที่นี่</div>
    <div class="credit">⁺‧⊹ ࣪ ˖ 🖤₊˚ ⋆ 𝒄𝒓𝒆𝒅𝒊𝒕 𝒇𝒐𝒓 𝒑𝒂𝒕𝒕𝒊𝒓𝒂 だ ⋆ ˚🕸️๋࣭ ⭑ ‧⁺</div>

    <div class="review-card">
        <h3>review my store</h3>
        <p>เลือกคะแนนจาก 1 ถึง 5</p>
        <div class="stars" id="star-rating">
            <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <button onclick="openModal()">click here for me!</button>
    </div>

    <div id="reviews-container"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>ฝากรีวิว</h3>
            <input type="text" id="rev-title" placeholder="ชื่อรีวิว">
            <textarea id="rev-body" placeholder="เขียนคำติชมที่ซื่อสัตย์ของคุณ ..."></textarea>
            <input type="text" id="rev-name" placeholder="ชื่อของคุณ *">
            <p>อัปโหลดรูปภาพรีวิว:</p>
            <input type="file" accept="image/*">
            <button onclick="submitReview()" style="width: 100%; margin-top: 20px;">ส่ง</button>
        </div>
    </div>

    <!-- Modal สำหรับดูรูปภาพแบบเต็ม -->
    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <img id="full-img" style="max-width:90%; max-height:90%; border-radius:10px; cursor:pointer;">
    </div>

</body>
</html>
