<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jaolove.studio16</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fefcf0; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; color: #555; }
        .banner { width: 100%; max-width: 400px; height: auto; border-radius: 15px; margin-bottom: 20px; }
        .info { text-align: center; margin-bottom: 20px; }
        .card { background-color: white; border: 2px solid #b22222; border-radius: 20px; padding: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stars { font-size: 30px; color: #d3d3d3; cursor: pointer; margin: 10px 0; }
        .stars span.active { color: #8b4513; }
        .upload-section { margin: 15px 0; }
        #profilePreview { width: 80px; height: 80px; border-radius: 50%; display: block; margin: 10px auto; object-fit: cover; border: 2px solid #ddd; }
        input[type="text"], textarea { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; }
        .submit-btn { background-color: #dce775; border: none; padding: 10px 20px; border-radius: 10px; font-size: 16px; cursor: not-allowed; opacity: 0.6; }
        .submit-btn.enabled { cursor: pointer; opacity: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; }
        .review-card { background: white; border: 2px solid #b22222; border-radius: 20px; padding: 20px; width: 90%; max-width: 350px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>
    <img src="https://via.placeholder.com/400x200?text=Banner+Image" alt="Banner" class="banner">
    <div class="info">
        <h1>🍀 . ٤. @jaoriche愛 ♡ ˚. . . ऽ : 6 🍎</h1>
    </div>
    <div class="card" id="mainCard">
        <h3>plus one for jaolove.studio16</h3>
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            <img id="profilePreview" src="https://via.placeholder.com/80?text=รูป" alt="Preview">
        </div>
        <input type="text" id="username" placeholder="ชื่อของคุณ">
        <textarea id="reviewText" placeholder="เขียนรีวิวที่นี่..."></textarea>
        <div class="stars" id="star-container">
            <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
        </div>
        <button id="submit-btn" class="submit-btn" disabled onclick="showModal()">click here kub babe~</button>
    </div>
    <div id="thankYouModal" class="modal">
        <div class="modal-content">
            <p>ขอบคุณที่แวะมาให้กำลังใจกันนะคะ 🖤🕸✨️</p>
            <button onclick="closeModal()">ปิด</button>
        </div>
    </div>

    <div id="reviewDisplay"></div>

    <script>
        let currentRating = 0;
        const stars = document.querySelectorAll('.stars span');
        const btn = document.getElementById('submit-btn');

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() { document.getElementById('profilePreview').src = reader.result; }
            reader.readAsDataURL(event.target.files[0]);
        }

        function setRating(rating) {
            currentRating = rating;
            stars.forEach((star, index) => { star.className = index < rating ? 'active' : ''; });
            btn.disabled = false;
            btn.classList.add('enabled');
        }

        function showModal() {
            document.getElementById('thankYouModal').style.display = 'flex';
            document.getElementById('mainCard').style.display = 'none';
            addReview();
        }

        function closeModal() {
            document.getElementById('thankYouModal').style.display = 'none';
            document.getElementById('mainCard').style.display = 'block';
        }

        function addReview() {
            const name = document.getElementById('username').value || "ไม่ระบุชื่อ";
            const text = document.getElementById('reviewText').value;
            const img = document.getElementById('profilePreview').src;
            const reviewContainer = document.getElementById('reviewDisplay');
            
            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div style="font-size: 25px; color: #8b4513;">${'★'.repeat(currentRating)}${'☆'.repeat(5-currentRating)}</div>
                <p>${text}</p>
                <div style="display:flex; align-items:center; margin-top:10px;">
                    <img src="${img}" style="width:40px; height:40px; border-radius:50%; margin-right:10px;">
                    <div><strong>${name}</strong><br><small>Just now</small></div>
                </div>
            `;
            reviewContainer.prepend(card);
        }
    </script>
</body>
</html>
